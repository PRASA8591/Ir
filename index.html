<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hacker OS Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        /* Hacker Theme Colors & Fonts */
        @import url('https://fonts.googleapis.com/css2?family=VT323&display=swap');
        
        body { font-family: 'VT323', monospace; text-transform: uppercase; }
        
        #input_video, #output_canvas, #hud-container { transform: scaleX(-1); }
        #hud-container > * { transform: scaleX(-1); }

        .hacker-glow {
            box-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            text-shadow: 0 0 5px rgba(0, 255, 0, 0.8);
        }
        
        .hacker-window {
            background: rgba(0, 10, 0, 0.85);
            border: 2px solid #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        .hacker-header {
            background: #00ff00;
            color: black;
            font-weight: bold;
        }

        .pinch-active {
            box-shadow: 0 0 30px rgba(0, 255, 0, 1) !important;
            border-color: #fff !important;
            background-color: rgba(0, 50, 0, 0.9) !important;
        }
    </style>
</head>
<body class="bg-black overflow-hidden flex items-center justify-center h-screen text-[#00ff00] select-none">

    <video id="input_video" class="absolute inset-0 w-full h-full object-cover opacity-30"></video>
    <canvas id="output_canvas" class="absolute inset-0 w-full h-full object-cover z-10 pointer-events-none"></canvas>

    <div id="hud-container" class="absolute inset-0 w-full h-full z-20 pointer-events-none">
        
        <div id="standby_screen" class="absolute inset-0 flex items-center justify-center pointer-events-auto">
            <div id="btn_on" class="virtual-interactive w-64 h-20 border-2 border-[#00ff00] hacker-glow flex items-center justify-center text-4xl cursor-pointer hover:bg-green-900/50 transition-colors">
                > SYSTEM ON _
            </div>
        </div>

        <div id="main_os" class="hidden absolute inset-0 w-full h-full origin-center transition-transform duration-200" style="transform: scaleX(-1) scale(1);">
            
            <div class="absolute right-10 top-20 flex flex-col space-y-8 pointer-events-auto">
                <div id="icon_console" class="virtual-interactive flex flex-col items-center cursor-pointer group">
                    <div class="w-16 h-12 border-2 border-[#00ff00] flex items-center justify-center text-3xl group-hover:bg-green-900/50">>_</div>
                    <span class="text-sm mt-1">Program Console</span>
                </div>
                <div id="icon_network" class="virtual-interactive flex flex-col items-center cursor-pointer group">
                    <div class="w-16 h-12 border-2 border-[#00ff00] flex items-center justify-center text-3xl group-hover:bg-green-900/50">⑆</div>
                    <span class="text-sm mt-1">Neural Network</span>
                </div>
                <div id="icon_surveillance" class="virtual-interactive flex flex-col items-center cursor-pointer group">
                    <div class="w-16 h-12 border-2 border-[#00ff00] flex items-center justify-center text-3xl group-hover:bg-green-900/50">◎</div>
                    <span class="text-sm mt-1">Surveillance</span>
                </div>
            </div>

            <div id="win_console" class="draggable-window hidden absolute w-96 h-64 hacker-window pointer-events-auto flex flex-col" style="left: 10%; top: 20%;">
                <div class="hacker-header px-2 py-1 flex justify-between items-center cursor-move window-grab-area">
                    <span>Program Console</span>
                    <span class="btn-close virtual-interactive bg-black text-[#00ff00] px-2 cursor-pointer hover:bg-red-500 hover:text-white">X</span>
                </div>
                <div class="p-3 text-lg flex-1 overflow-hidden">
                    <p>penetrate" == typeof</p>
                    <p class="animate-pulse">_</p>
                </div>
            </div>

            <div id="win_network" class="draggable-window hidden absolute w-[400px] h-[250px] hacker-window pointer-events-auto flex flex-col" style="left: 30%; top: 40%;">
                <div class="hacker-header px-2 py-1 flex justify-between items-center cursor-move window-grab-area">
                    <span>Neural Network Tracing</span>
                    <span class="btn-close virtual-interactive bg-black text-[#00ff00] px-2 cursor-pointer hover:bg-red-500 hover:text-white">X</span>
                </div>
                <div class="flex-1 bg-[radial-gradient(#00ff00_1px,transparent_1px)] [background-size:20px_20px] opacity-50"></div>
            </div>

            <div id="win_surveillance" class="draggable-window hidden absolute w-[350px] h-[250px] hacker-window pointer-events-auto flex flex-col" style="left: 50%; top: 10%;">
                <div class="hacker-header px-2 py-1 flex justify-between items-center cursor-move window-grab-area">
                    <span>Headquarter Surveillance</span>
                    <span class="btn-close virtual-interactive bg-black text-[#00ff00] px-2 cursor-pointer hover:bg-red-500 hover:text-white">X</span>
                </div>
                <div class="flex-1 bg-green-950 flex items-center justify-center text-2xl animate-pulse">
                    [ VIDEO FEED LOST ]
                </div>
            </div>

        </div>

        <div class="absolute bottom-4 left-4 text-xl" style="transform: scaleX(-1);">
            > STATUS: <span id="status" class="text-yellow-400">CONNECTING...</span>
            <div id="log_action" class="text-white">> WAITING FOR INPUT</div>
        </div>
    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const logAction = document.getElementById('log_action');
        
        const standbyScreen = document.getElementById('standby_screen');
        const mainOS = document.getElementById('main_os');
        
        let isGrabbing = false;
        let activeWindow = null;
        let grabOffset = { x: 0, y: 0 };
        let isClickLocked = false; 
        
        // Zoom functionality
        let isZooming = false;
        let initialHandDist = 0;
        let currentScale = 1;
        let initialScale = 1;

        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function normalizeToScreen(landmark) {
            return { x: (1 - landmark.x) * window.innerWidth, y: landmark.y * window.innerHeight };
        }

        function getPinch(landmarks) {
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            return Math.sqrt(Math.pow(thumbTip.x - indexTip.x, 2) + Math.pow(thumbTip.y - indexTip.y, 2)) < 0.05;
        }

        // Handle logical clicks (Buttons, Icons, Close buttons)
        function handleInteraction(element) {
            if (element.id === 'btn_on') {
                standbyScreen.classList.add('hidden');
                mainOS.classList.remove('hidden');
                logAction.innerText = "> ACCESS GRANTED";
            } 
            else if (element.id === 'icon_console') { document.getElementById('win_console').classList.remove('hidden'); }
            else if (element.id === 'icon_network') { document.getElementById('win_network').classList.remove('hidden'); }
            else if (element.id === 'icon_surveillance') { document.getElementById('win_surveillance').classList.remove('hidden'); }
            else if (element.classList.contains('btn-close')) {
                // Find parent window and hide it
                element.closest('.draggable-window').classList.add('hidden');
            }
            
            // Bring interacted window to front if it's an icon click
            if(element.id && element.id.startsWith('icon_')) {
                const winId = element.id.replace('icon_', 'win_');
                const win = document.getElementById(winId);
                document.querySelectorAll('.draggable-window').forEach(w => w.style.zIndex = "10");
                if(win) win.style.zIndex = "50";
            }
        }

        function onResults(results) {
            document.getElementById('status').innerText = "ONLINE";
            document.getElementById('status').className = "text-[#00ff00]";

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                // Draw Hacker style grid/lines for hands
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#004400', lineWidth: 1});
                    drawLandmarks(canvasCtx, landmarks, {color: '#00ff00', lineWidth: 1, radius: 2});
                }

                // ZOOM LOGIC (Two Hands)
                if (results.multiHandLandmarks.length >= 2 && !standbyScreen.classList.contains('hidden') === false) {
                    const hand1 = normalizeToScreen(results.multiHandLandmarks[0][8]);
                    const hand2 = normalizeToScreen(results.multiHandLandmarks[1][8]);
                    const currentDist = Math.sqrt(Math.pow(hand1.x - hand2.x, 2) + Math.pow(hand1.y - hand2.y, 2));

                    if (!isZooming) {
                        isZooming = true;
                        initialHandDist = currentDist;
                        initialScale = currentScale;
                    } else {
                        let factor = currentDist / initialHandDist;
                        currentScale = Math.max(0.5, Math.min(initialScale * factor, 2.0));
                        mainOS.style.transform = `scaleX(-1) scale(${currentScale})`;
                    }
                } else {
                    isZooming = false;
                }

                // CLICK & DRAG LOGIC (Single Hand)
                if (results.multiHandLandmarks.length > 0 && !isZooming) {
                    const hand = results.multiHandLandmarks[0];
                    const indexTip = normalizeToScreen(hand[8]);
                    const isPinching = getPinch(hand);
                    let interactingWithUI = false;

                    // 1. Check Clicks (Icons, Buttons, Close marks)
                    const interactables = Array.from(document.querySelectorAll('.virtual-interactive')).filter(el => el.closest('.hidden') === null);
                    
                    interactables.forEach(el => {
                        // Account for scaling when calculating bounding rects for precise clicks
                        const rect = el.getBoundingClientRect(); 
                        if (indexTip.x > rect.left && indexTip.x < rect.right && indexTip.y > rect.top && indexTip.y < rect.bottom) {
                            interactingWithUI = true;
                            if (isPinching) {
                                el.classList.add('hacker-glow');
                                if (!isClickLocked) {
                                    isClickLocked = true;
                                    handleInteraction(el);
                                }
                            } else {
                                el.classList.remove('hacker-glow');
                            }
                        }
                    });

                    if (!isPinching) isClickLocked = false;

                    // 2. Window Dragging (Only via Header area)
                    if (!interactingWithUI && !mainOS.classList.contains('hidden')) {
                        if (isPinching && !activeWindow) {
                            const headers = document.querySelectorAll('.window-grab-area');
                            headers.forEach(header => {
                                // Skip hidden windows
                                if (header.closest('.hidden')) return; 
                                
                                const rect = header.getBoundingClientRect();
                                if (indexTip.x > rect.left && indexTip.x < rect.right && indexTip.y > rect.top && indexTip.y < rect.bottom) {
                                    activeWindow = header.closest('.draggable-window');
                                    
                                    // Bring to front
                                    document.querySelectorAll('.draggable-window').forEach(w => w.style.zIndex = "10");
                                    activeWindow.style.zIndex = "50";
                                    activeWindow.classList.add('pinch-active');

                                    // Offset calculation (adjust for scale)
                                    const windowRect = activeWindow.getBoundingClientRect();
                                    grabOffset.x = (indexTip.x - windowRect.left) / currentScale;
                                    grabOffset.y = (indexTip.y - windowRect.top) / currentScale;
                                }
                            });
                        }

                        if (activeWindow) {
                            if (isPinching) {
                                // Calculate new positions based on parent scaling
                                const newLeft = (indexTip.x / currentScale) - grabOffset.x;
                                const newTop = (indexTip.y / currentScale) - grabOffset.y;
                                
                                // In a mirror flipped container (scaleX(-1)), left calculation is slightly complex, 
                                // but setting absolute pixels usually overrides seamlessly on the scaled container.
                                activeWindow.style.left = `${newLeft}px`;
                                activeWindow.style.top = `${newTop}px`;
                            } else {
                                activeWindow.classList.remove('pinch-active');
                                activeWindow = null;
                            }
                        }
                    }
                }
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 2, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 1280, height: 720 });
        camera.start();
    </script>
</body>
</html>
