<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark HUD V5 - Voice & Mobile Fix</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        body { font-family: 'Orbitron', sans-serif; }
        
        /* FIX FOR MOBILE: Using 'fill' forces exact coordinate mapping without offsets */
        #input_video, #output_canvas {
            transform: scaleX(-1);
            object-fit: fill; 
        }

        .iron-glow {
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.5);
            border-color: rgba(6, 182, 212, 0.8);
        }
        
        .iron-panel {
            background: rgba(8, 47, 73, 0.4);
            backdrop-filter: blur(8px);
            border: 1.5px solid rgba(6, 182, 212, 0.6);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.2);
        }

        .pinch-active {
            border-color: rgba(239, 68, 68, 1) !important;
            box-shadow: 0 0 25px rgba(239, 68, 68, 0.7) !important;
        }

        .reactor-core {
            border: 4px dashed rgba(6, 182, 212, 0.8);
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.6);
            animation: spin 8s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-black overflow-hidden h-screen text-cyan-400 select-none">

    <video id="input_video" class="absolute inset-0 w-full h-full opacity-40"></video>
    <canvas id="output_canvas" class="absolute inset-0 w-full h-full z-10 pointer-events-none"></canvas>

    <div id="unlock_screen" class="absolute inset-0 z-[100] bg-black flex flex-col items-center justify-center cursor-pointer pointer-events-auto" onclick="unlockAudio()">
        <div class="text-2xl text-cyan-400 font-bold animate-pulse border-2 border-cyan-400 p-6 rounded-xl iron-glow">
            TAP SCREEN ONCE TO ENABLE J.A.R.V.I.S AUDIO
        </div>
    </div>

    <div id="hud-container" class="absolute inset-0 w-full h-full z-20 pointer-events-none hidden">
        
        <div id="standby_screen" class="absolute inset-0 flex flex-col items-center justify-center pointer-events-auto">
            <div id="btn_on" class="virtual-interactive w-64 h-24 border-2 rounded-xl iron-glow flex flex-col items-center justify-center cursor-pointer bg-cyan-950/40 hover:bg-cyan-900/60 transition-all">
                <span class="text-3xl font-bold tracking-widest text-white">START</span>
                <span class="text-xs text-cyan-400 font-sans mt-2">J.A.R.V.I.S. SYSTEM</span>
            </div>
        </div>

        <div id="main_os" class="hidden absolute inset-0 w-full h-full">
            
            <div class="absolute right-4 top-20 flex flex-col space-y-6 pointer-events-auto">
                <div id="icon_core" class="virtual-interactive flex flex-col items-center cursor-pointer group bg-cyan-950/50 p-4 rounded-lg border border-cyan-500/50 w-20 iron-glow">
                    <div class="text-2xl mb-1 text-cyan-300">☢</div>
                    <span class="text-[9px] text-center font-bold">CORE</span>
                </div>
                <div id="btn_off" class="virtual-interactive flex flex-col items-center cursor-pointer bg-red-950/50 p-4 rounded-lg border border-red-500/80 w-20 shadow-[0_0_15px_rgba(239,68,68,0.4)] mt-10">
                    <div class="text-xl font-bold text-red-400">OFF</div>
                </div>
            </div>

            <div id="win_core" class="draggable-window hidden absolute w-[320px] h-[220px] iron-panel rounded-lg pointer-events-auto flex flex-col" style="left: 10%; top: 20%;">
                <div class="window-header bg-cyan-500/30 px-3 py-3 flex justify-between items-center border-b border-cyan-500/60 cursor-move">
                    <span class="text-[10px] font-bold tracking-wider text-white">// ARC REACTOR</span>
                    <span class="btn-close virtual-interactive text-red-400 font-bold px-3 py-1 cursor-pointer border border-red-500/50 rounded bg-red-950/40 hover:bg-red-500 hover:text-white">X</span>
                </div>
                <div class="p-4 flex items-center justify-around flex-1">
                    <div class="w-16 h-16 rounded-full reactor-core flex items-center justify-center">
                        <div class="w-10 h-10 rounded-full bg-cyan-400/50 border-2 border-cyan-400 animate-pulse"></div>
                    </div>
                    <div class="text-[10px] space-y-2">
                        <div>OUTPUT: <span class="text-green-400 font-bold">3 GW</span></div>
                        <div>STABILITY: <span class="text-cyan-300 font-bold">99.9%</span></div>
                        <div class="text-[9px] text-gray-400 mt-2 border-t border-gray-600 pt-1">Pinch Header to Drag</div>
                    </div>
                </div>
            </div>

        </div>

        <div class="absolute bottom-6 left-6 text-[10px] bg-slate-950/90 p-3 rounded-lg border border-cyan-500/50 iron-glow w-64">
            <div>SYS STATUS: <span id="status" class="text-yellow-400 font-bold">CONNECTING</span></div>
            <div id="live_log" class="text-white mt-1 animate-pulse">> WAITING...</div>
        </div>
    </div>

    <script>
        // Elements
        const unlockScreen = document.getElementById('unlock_screen');
        const hudContainer = document.getElementById('hud-container');
        const standbyScreen = document.getElementById('standby_screen');
        const mainOS = document.getElementById('main_os');
        const liveLog = document.getElementById('live_log');

        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');

        let activeWindow = null;
        let grabOffset = { x: 0, y: 0 };
        let isClickLocked = false;
        let voiceEnabled = false;

        // --- 1. JARVIS VOICE SYSTEM ---
        function speakJarvis(text) {
            if (!voiceEnabled || !('speechSynthesis' in window)) return;
            window.speechSynthesis.cancel(); // Stop current speech
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'en-US';
            msg.rate = 0.9;  // Slightly slower, robotic pace
            msg.pitch = 0.5; // Deeper voice
            msg.volume = 1;
            window.speechSynthesis.speak(msg);
        }

        // Must be triggered by a real physical click first
        function unlockAudio() {
            voiceEnabled = true;
            unlockScreen.classList.add('hidden');
            hudContainer.classList.remove('hidden');
            
            // Play empty sound to unlock audio context in mobile browsers
            const unlockMsg = new SpeechSynthesisUtterance("");
            window.speechSynthesis.speak(unlockMsg);
            
            liveLog.innerText = "> Audio Systems Online.";
        }

        // Resize
        function resizeCanvas() {
            canvasElement.width = window.innerWidth;
            canvasElement.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // --- 2. COORDINATE FIX FOR MOBILE ---
        function normalizeToScreen(landmark) {
            return { 
                x: (1 - landmark.x) * window.innerWidth, 
                y: landmark.y * window.innerHeight 
            };
        }

        function getPinch(landmarks) {
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            return Math.sqrt(Math.pow(thumbTip.x - indexTip.x, 2) + Math.pow(thumbTip.y - indexTip.y, 2)) < 0.05;
        }

        function focusWindow(win) {
            if (!win) return;
            document.querySelectorAll('.draggable-window').forEach(w => w.style.zIndex = "30");
            win.style.zIndex = "50";
        }

        // --- 3. SYSTEM LOGIC & BUTTON ACTIONS ---
        function handleInteraction(element) {
            if (element.id === 'btn_on') {
                standbyScreen.classList.add('hidden');
                mainOS.classList.remove('hidden');
                liveLog.innerText = "> System Activated.";
                speakJarvis("J.A.R.V.I.S. system activated. All systems online and ready, sir.");
            } 
            else if (element.id === 'icon_core') { 
                const win = document.getElementById('win_core');
                win.classList.remove('hidden'); 
                focusWindow(win);
                speakJarvis("Accessing Arc Reactor Core.");
            }
            else if (element.id === 'btn_off') {
                mainOS.classList.add('hidden');
                standbyScreen.classList.remove('hidden');
                // Hide all open windows when shutting down
                document.querySelectorAll('.draggable-window').forEach(w => w.classList.add('hidden'));
                liveLog.innerText = "> System Offline.";
                speakJarvis("Powering down all primary systems. Goodbye, sir.");
            }
            else if (element.classList.contains('btn-close')) {
                element.closest('.draggable-window').classList.add('hidden');
                speakJarvis("Window closed.");
            }
        }

        // --- 4. MEDIA PIPE TRACKING ---
        function onResults(results) {
            document.getElementById('status').innerText = "TRACKING ACTIVE";
            document.getElementById('status').className = "text-green-400 font-bold";

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#06b6d4', lineWidth: 2});
                    drawLandmarks(canvasCtx, landmarks, {color: '#ef4444', lineWidth: 1, radius: 4}); // Bigger red dots
                }

                if (results.multiHandLandmarks.length > 0) {
                    const hand = results.multiHandLandmarks[0];
                    const indexTip = normalizeToScreen(hand[8]);
                    const isPinching = getPinch(hand);
                    let interactingWithUI = false;

                    // BUTTON CLICKS
                    const interactables = Array.from(document.querySelectorAll('.virtual-interactive')).filter(el => el.closest('.hidden') === null);
                    
                    interactables.forEach(el => {
                        const rect = el.getBoundingClientRect(); 
                        if (indexTip.x > rect.left && indexTip.x < rect.right && indexTip.y > rect.top && indexTip.y < rect.bottom) {
                            interactingWithUI = true;
                            if (isPinching) {
                                el.classList.add('pinch-active');
                                if (!isClickLocked) {
                                    isClickLocked = true;
                                    handleInteraction(el);
                                }
                            } else {
                                el.classList.remove('pinch-active');
                                el.style.backgroundColor = "rgba(6, 182, 212, 0.4)"; // Hover
                            }
                        } else {
                            if(!el.classList.contains('btn-close') && el.id !== 'btn_off') el.style.backgroundColor = "";
                        }
                    });

                    if (!isPinching) isClickLocked = false;

                    // WINDOW DRAGGING
                    if (!interactingWithUI && !mainOS.classList.contains('hidden')) {
                        if (isPinching && !activeWindow) {
                            const headers = document.querySelectorAll('.window-header');
                            headers.forEach(header => {
                                if (header.closest('.hidden')) return; 
                                
                                const rect = header.getBoundingClientRect();
                                if (indexTip.x > rect.left && indexTip.x < rect.right && indexTip.y > rect.top && indexTip.y < rect.bottom) {
                                    activeWindow = header.closest('.draggable-window');
                                    focusWindow(activeWindow);
                                    activeWindow.classList.add('pinch-active');

                                    const windowRect = activeWindow.getBoundingClientRect();
                                    grabOffset.x = indexTip.x - windowRect.left;
                                    grabOffset.y = indexTip.y - windowRect.top;
                                    speakJarvis("Moving interface.");
                                }
                            });
                        }

                        if (activeWindow) {
                            if (isPinching) {
                                activeWindow.style.left = `${indexTip.x - grabOffset.x}px`;
                                activeWindow.style.top = `${indexTip.y - grabOffset.y}px`;
                            } else {
                                activeWindow.classList.remove('pinch-active');
                                activeWindow = null;
                            }
                        }
                    }
                }
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
        hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.7 });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, { onFrame: async () => { await hands.send({image: videoElement}); }, width: 1280, height: 720 });
        camera.start();
    </script>
</body>
</html>
