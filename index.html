<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark HUD Mark II</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>

    <style>
        /* Mirror effect handle කරන්න වීඩියෝ එක flip කරනවා */
        #input_video, #output_canvas, #hud-container {
            transform: scaleX(-1);
        }
        
        /* අකුරු අනිත් පැත්ත හැරෙන එක නවත්තන්න HUD container එක ඇතුලේ elements flip කරනවා */
        #hud-container > * {
            transform: scaleX(-1);
        }

        .sci-fi-glow {
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.7);
            border-color: rgba(0, 255, 255, 0.9);
        }
        
        .pinch-active {
            box-shadow: 0 0 25px rgba(255, 0, 0, 0.9) !important;
            border-color: rgba(255, 0, 0, 1) !important;
        }
    </style>
</head>
<body class="bg-black overflow-hidden flex items-center justify-center h-screen font-mono cursor-none">

    <video id="input_video" class="absolute inset-0 w-full h-full object-cover opacity-50"></video>
    
    <canvas id="output_canvas" class="absolute inset-0 w-full h-full object-cover z-10 opacity-30"></canvas>

    <div id="hud-container" class="absolute inset-0 w-full h-full z-20 pointer-events-none">
        
        <div id="virtual_screen" class="absolute w-[350px] h-[250px] bg-cyan-950/40 border-2 rounded-lg sci-fi-glow flex flex-col p-4 text-cyan-200 pointer-events-auto transition-shadow duration-150" style="left: 30%; top: 20%;">
            <div class="flex justify-between items-center border-b border-cyan-500 pb-2 mb-2">
                <span class="text-xs">SYSTEM STATUS: <span class="text-green-400">ACTIVE</span></span>
                <span class="text-xs">MK-II</span>
            </div>
            <p class="text-xl font-bold text-center mt-8">ARK REACTOR</p>
            <p class="text-5xl font-extrabold text-cyan-100 text-center animate-pulse">100%</p>
            <div class="absolute bottom-2 right-2 text-[10px] text-cyan-500">GRAB CORNER TO RESIZE</div>
        </div>

        <div id="btn_1" class="virtual-button absolute w-32 h-16 bg-blue-900/50 border-2 border-blue-400 rounded sci-fi-glow flex items-center justify-center text-blue-100 font-bold pointer-events-auto" style="left: 70%; top: 20%;">
            DEPLOY
        </div>

        <div id="btn_2" class="virtual-button absolute w-32 h-16 bg-red-900/50 border-2 border-red-400 rounded sci-fi-glow flex items-center justify-center text-red-100 font-bold pointer-events-auto" style="left: 70%; top: 40%;">
            RETRACT
        </div>

        <div class="absolute bottom-10 left-10 w-80 text-cyan-400 text-sm">
            [SYS] Gesture System Initialized...<br>
            [SYS] Waiting for hand input...<br>
            <div id="log_action" class="text-white font-bold"></div>
        </div>

    </div>

    <script>
        const videoElement = document.getElementById('input_video');
        const canvasElement = document.getElementById('output_canvas');
        const canvasCtx = canvasElement.getContext('2d');
        const logAction = document.getElementById('log_action');

        // HUD Elements
        const virtualScreen = document.getElementById('virtual_screen');
        const buttons = document.querySelectorAll('.virtual-button');

        // State Management
        let isGrabbingScreen = false;
        let grabOffset = { x: 0, y: 0 };
        let screenState = { x: 30, y: 20, width: 350, height: 250 }; // in % and px

        // Mapping helper (coordinates are 0-1 from MediaPipe)
        function normalizeToScreen(landmark) {
            // Mirror flip logic applied here
            return {
                x: (1 - landmark.x) * window.innerWidth,
                y: landmark.y * window.innerHeight
            };
        }

        // Detect Pinch Gesture (Distance between Thumb and Index finger)
        function getPinch(landmarks) {
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const distance = Math.sqrt(Math.pow(thumbTip.x - indexTip.x, 2) + Math.pow(thumbTip.y - indexTip.y, 2));
            return distance < 0.04; // Pinch threshold
        }

        function onResults(results) {
            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                let primaryHand = null;
                
                // Track only the first hand detected for interface interaction
                if(results.multiHandLandmarks.length > 0) {
                    primaryHand = results.multiHandLandmarks[0];
                    // Optional: Draw hand landmarks for debugging
                    // drawConnectors(canvasCtx, primaryHand, HAND_CONNECTIONS, {color: '#00FFFF', lineWidth: 1});
                    // drawLandmarks(canvasCtx, primaryHand, {color: '#FF0000', lineWidth: 1});
                }

                if (primaryHand) {
                    const indexTip = normalizeToScreen(primaryHand[8]); // দබරැඟිල්ලේ තුඩ
                    const isPinching = getPinch(primaryHand);

                    // --- LOGIC 1: Interacting with Buttons (Click) ---
                    buttons.forEach(btn => {
                        const rect = btn.getBoundingClientRect();
                        // මීටරය බටන් එක උඩ තියෙද්දි ඇඟිලි ගැවුවොත් "Click"
                        if (indexTip.x > rect.left && indexTip.x < rect.right && indexTip.y > rect.top && indexTip.y < rect.bottom) {
                            if (isPinching) {
                                btn.classList.add('pinch-active');
                                logAction.innerText = `[ACTION] Button ${btn.innerText} Clicked!`;
                            } else {
                                btn.classList.remove('pinch-active');
                                btn.style.backgroundColor = "rgba(255, 255, 255, 0.3)"; // Hover effect
                            }
                        } else {
                            btn.style.backgroundColor = ""; // Reset background
                        }
                    });

                    // --- LOGIC 2: Draggable Virtual Screen (Grab) ---
                    const screenRect = virtualScreen.getBoundingClientRect();
                    const isOverScreen = indexTip.x > screenRect.left && indexTip.x < screenRect.right && indexTip.y > screenRect.top && indexTip.y < screenRect.bottom;

                    if (isOverScreen && isPinching && !isGrabbingScreen) {
                        isGrabbingScreen = true;
                        virtualScreen.classList.add('pinch-active');
                        logAction.innerText = "[ACTION] Screen Grabbed";
                        grabOffset.x = indexTip.x - screenRect.left;
                        grabOffset.y = indexTip.y - screenRect.top;
                    }

                    if (isGrabbingScreen) {
                        if (isPinching) {
                            // Move screen based on hand position
                            virtualScreen.style.left = `${indexTip.x - grabOffset.x}px`;
                            virtualScreen.style.top = `${indexTip.y - grabOffset.y}px`;
                        } else {
                            isGrabbingScreen = false;
                            virtualScreen.classList.remove('pinch-active');
                            logAction.innerText = "[SYS] Screen Released";
                        }
                    }
                }
            }
            canvasCtx.restore();
        }

        const hands = new Hands({locateFile: (file) => {
            return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
        }});
        
        hands.setOptions({
            maxNumHands: 1, // Focus on one hand for interaction clarity
            modelComplexity: 1,
            minDetectionConfidence: 0.8, // Increased confidence for stable interaction
            minTrackingConfidence: 0.8
        });
        hands.onResults(onResults);

        const camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 1280,
            height: 720
        });
        camera.start();
    </script>
</body>
</html>
